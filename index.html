<!DOCTYPE html>
<html lang="en" data-theme="leonux" data-view="edit">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Zolto — Extended Markdown document engine">
  <meta name="theme-color" content="#15171B">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icons/logo/zolto-icon.svg">
  <title>Zolto Studio · LeonUX</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- FontAwesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="css/core/variables.css">
  <link rel="stylesheet" href="css/core/reset.css">
  <link rel="stylesheet" href="css/layout/app.css">
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/modals.css">
  <link rel="stylesheet" href="css/components/prose.css">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="brand">
      <div><img src="assets/icons/logo/zolto_color.svg" alt="Zolto Logo" style="width: 24px; height: 24px; display: block;"></div>
      <span class="brand-name">ZL  Studio</span>
    </div>
    
    <div class="view-switch">
      <button class="btn btn-sm btn-secondary active" data-view="edit" tabindex="0"><i class="fa-solid fa-pen-to-square"></i></button>
      <button class="btn btn-sm btn-ghost" data-view="preview" tabindex="0"><i class="fa-solid fa-eye"></i></button>
    </div>

    <div class="controls">
      <button class="btn btn-icon btn-ghost" id="btn-open" title="Open .zl file (Ctrl+O)" tabindex="0"><i class="fa-solid fa-upload"></i></button>
      <button class="btn btn-icon btn-ghost" id="btn-save" title="Save source as .zl" tabindex="0"><i class="fa-solid fa-download"></i></button>
      <button class="btn btn-ghost" id="btn-tests" tabindex="0"><i class="fa-solid fa-flask"></i><span>Tests</span></button>
      <button class="btn btn-primary" id="btn-pdf" tabindex="0"><i class="fa-solid fa-file-pdf"></i> <span>Export PDF</span></button>
    </div>
  </header>

  <!-- WORKSPACE -->
  <div class="workspace">

    <!-- EDITOR PANEL -->
    <aside class="ed-panel" id="ed-panel">
      <div class="ed-hdr">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="lx-badge lx-badge-blue">source.zl</span>
        </div>
        <div class="ed-hdr-r">
          <span id="char-count" style="opacity:.6">0 chars</span>
        </div>
      </div>
      <div class="toolbar" role="toolbar" aria-label="Formatting">
        <button class="btn btn-sm btn-icon btn-ghost tb" data-wrap="**" title="Bold (Ctrl+B)" tabindex="0"><i class="fa-solid fa-bold"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-wrap="*" title="Italic (Ctrl+I)" tabindex="0"><i class="fa-solid fa-italic"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-wrap="~~" title="Strikethrough" tabindex="0"><i class="fa-solid fa-strikethrough"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-wrap="==" title="Highlight" tabindex="0"><i class="fa-solid fa-highlighter"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-wrap="`" title="Inline code" tabindex="0"><i class="fa-solid fa-terminal"></i></button>
        <div style="width:1px; height:16px; background:var(--border-subtle); margin:0 4px; flex-shrink: 0;"></div>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-insert="# " title="Heading" tabindex="0"><i class="fa-solid fa-heading"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-insert="- " title="List item" tabindex="0"><i class="fa-solid fa-list-ul"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-insert="- [ ] " title="Task item" tabindex="0"><i class="fa-solid fa-list-check"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-insert="---\n" title="Horizontal rule" tabindex="0"><i class="fa-solid fa-ruler-horizontal"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-block="```\n" title="Code block" tabindex="0"><i class="fa-solid fa-file-code"></i></button>
        <div style="width:1px; height:16px; background:var(--border-subtle); margin:0 4px; flex-shrink: 0;"></div>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-wrap-open="[" data-wrap-close="](url)" title="Link" tabindex="0"><i class="fa-solid fa-link"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-wrap-open="![" data-wrap-close="](url)" title="Image" tabindex="0"><i class="fa-solid fa-image"></i></button>
        <div style="width:1px; height:16px; background:var(--border-subtle); margin:0 4px; flex-shrink: 0;"></div>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-block="> [!NOTE]\n> " title="Callout" tabindex="0"><i class="fa-solid fa-quote-left"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-block="[info]\n" data-block-close="\n[/info]" title="Admonition" tabindex="0"><i class="fa-solid fa-circle-info"></i></button>
        <button class="btn btn-sm btn-icon btn-ghost tb" data-insert-inline="[[Ctrl+K]]" title="Keyboard key" tabindex="0"><i class="fa-solid fa-keyboard"></i></button>
      </div>
      <textarea id="editor" spellcheck="false" aria-label="Zolto source editor" placeholder="Start writing Zolto Markdown…" tabindex="0"></textarea>
      <div class="status">
        <span id="s-errors" class="s-ok"><i class="fa-solid fa-circle-check"></i> No errors</span>
        <span>·</span>
        <span id="s-warn"></span>
        <span id="s-dot2" style="display:none">·</span>
        <span id="s-time"></span>
      </div>
    </aside>

    <!-- RESIZE HANDLE -->
    <div class="divider" id="divider" title="Drag to resize" aria-hidden="true" tabindex="-1"></div>

    <!-- PREVIEW CANVAS -->
    <main class="canvas" id="canvas">
      <div class="canvas-hdr">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="lx-badge lx-badge-green">Live Preview</span>
        </div>
        <span id="render-time" style="opacity:.6"></span>
      </div>
      <div class="canvas-scroll">
        <div class="card spotlight" id="pdf-root">
          <div id="preview" class="prose"></div>
        </div>
      </div>
    </main>

  </div><!-- /workspace -->
</div><!-- /app -->

<!-- Toasts -->
<div id="toast"><i class="fa-solid fa-circle-info"></i> <span id="toast-msg"></span></div>
<!-- Loading Overlay -->
<div id="loading-overlay" style="position:fixed;inset:0;background:rgba(11,13,15,0.7);backdrop-filter:blur(4px);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div class="material-symbols-rounded" style="font-size:48px;color:var(--primary);animation:spin 1s linear infinite;">progress_activity</div>
  <div style="color:var(--text-primary);font-weight:600;font-size:1rem;">Generating PDF...</div>
</div>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
<input type="file" id="file-input" accept=".zl,.md,.txt" style="display:none">

<!-- TEST MODAL -->
<div class="lx-modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-label="Test results">
  <div class="lx-modal-box">
    <div class="lx-modal-head">
      <div class="lx-modal-title"><i class="fa-solid fa-clipboard-check"></i> Test Suite</div>
      <button class="btn btn-icon btn-ghost" id="btn-modal-close" title="Close" tabindex="0"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="lx-modal-body">
      <div id="modal-summary" style="margin-bottom: var(--space-2); font-weight: 500;">Click <em>Tests</em> in the header to run the suite.</div>
      <div id="modal-body-content" style="font-family: var(--font-mono); font-size: 0.75rem;"></div>
    </div>
    <div class="lx-modal-foot">
      <button class="btn btn-secondary" id="btn-modal-close-foot" tabindex="0">Close</button>
    </div>
  </div>
</div>

<script type="module">
import { compile, parse, about } from './src/zolto.js';

// ── DOM ──────────────────────────────────────────────────────────────────────
const editor   = document.getElementById('editor');
const preview  = document.getElementById('preview');
const sErrors  = document.getElementById('s-errors');
const sWarn    = document.getElementById('s-warn');
const sDot2    = document.getElementById('s-dot2');
const sTime    = document.getElementById('s-time');
const rtLabel  = document.getElementById('render-time');
const charCnt  = document.getElementById('char-count');

// ── Spotlight Effect ──────────────────────────────────────────────────────────
const cards = document.querySelectorAll('.card.spotlight');
cards.forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    card.style.setProperty('--x', `${x}px`);
    card.style.setProperty('--y', `${y}px`);
  });
});

// ── Live render ───────────────────────────────────────────────────────────────
let timer;
function renderPreview() {
  const src = editor.value;
  const t0  = performance.now();
  const { errors, warnings } = parse(src);
  const html = compile(src);
  const ms   = (performance.now() - t0).toFixed(1);

  preview.innerHTML = html;
  charCnt.textContent = `${src.length} chars`;
  rtLabel.textContent = `${ms} ms`;
  sTime.textContent = `${ms} ms`;

  if (errors.length) {
    sErrors.innerHTML = `<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M18.3 5.71c-.39-.39-1.02-.39-1.41 0L12 10.59 7.11 5.7c-.39-.39-1.02-.39-1.41 0-.39.39-.39 1.02 0 1.41L10.59 12 5.7 16.89c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0L12 13.41l4.89 4.89c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L13.41 12l4.89-4.89c.38-.38.38-1.02 0-1.4z"/></svg> ${errors.length} error${errors.length > 1 ? 's' : ''}`;
    sErrors.className = 's-err';
  } else {
    sErrors.innerHTML = '<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM9.29 16.29L5.7 12.7c-.39-.39-.39-1.02 0-1.41.39-.39 1.02-.39 1.41 0L10 14.17l6.88-6.88c.39-.39 1.02-.39 1.41 0 .39.39.39 1.02 0 1.41l-7.59 7.59c-.38.39-1.02.39-1.41 0z"/></svg> No errors';
    sErrors.className = 's-ok';
  }
  if (warnings.length) {
    sWarn.textContent = `${warnings.length} warning${warnings.length > 1 ? 's' : ''}`;
    sWarn.className = 's-warn';
    sDot2.style.display = '';
  } else {
    sWarn.textContent = '';
    sDot2.style.display = 'none';
  }
}
editor.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(renderPreview, 120); });

// ── Toolbar ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tb[data-wrap]').forEach(b =>
  b.addEventListener('click', () => wrapSel(b.dataset.wrap, b.dataset.wrap))
);
document.querySelectorAll('.tb[data-wrap-open]').forEach(b =>
  b.addEventListener('click', () => wrapSel(b.dataset.wrapOpen, b.dataset.wrapClose))
);
document.querySelectorAll('.tb[data-insert]').forEach(b =>
  b.addEventListener('click', () => insertLineStart(b.dataset.insert.replace(/\\n/g, '\n')))
);
document.querySelectorAll('.tb[data-insert-inline]').forEach(b =>
  b.addEventListener('click', () => insertInline(b.dataset.insertInline.replace(/\\n/g, '\n')))
);
document.querySelectorAll('.tb[data-block]').forEach(b =>
  b.addEventListener('click', () => {
    const open  = b.dataset.block.replace(/\\n/g, '\n');
    const close = (b.dataset.blockClose ?? '\n```').replace(/\\n/g, '\n');
    wrapSel(open, close);
  })
);

function wrapSel(open, close) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.slice(s, e) || 'text';
  editor.setRangeText(open + sel + close, s, e, 'select');
  renderPreview();
  editor.focus();
}
function insertLineStart(text) {
  const p = editor.selectionStart;
  const ls = editor.value.lastIndexOf('\n', p - 1) + 1;
  editor.setRangeText(text, ls, ls, 'end');
  renderPreview();
  editor.focus();
}
function insertInline(text) {
  const p = editor.selectionStart;
  editor.setRangeText(text, p, p, 'end');
  renderPreview();
  editor.focus();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
editor.addEventListener('keydown', e => {
  const mod = e.ctrlKey || e.metaKey;
  if (mod && e.key === 'b') { e.preventDefault(); wrapSel('**', '**'); }
  if (mod && e.key === 'i') { e.preventDefault(); wrapSel('*', '*'); }
  if (mod && e.key === 'k') { e.preventDefault(); wrapSel('[', '](url)'); }
  if (mod && e.key === 'o') { e.preventDefault(); document.getElementById('file-input').click(); }
  if (mod && e.key === 's') { e.preventDefault(); saveSource(); }
  if (e.key === 'Tab') { e.preventDefault(); editor.setRangeText('  ', editor.selectionStart, editor.selectionEnd, 'end'); }
});

// ── Resize divider ────────────────────────────────────────────────────────────
const divider = document.getElementById('divider');
const edPanel = document.getElementById('ed-panel');
let dragging  = false;
divider.addEventListener('mousedown', e => {
  dragging = true; divider.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const ws = document.querySelector('.workspace').getBoundingClientRect();
  const w  = Math.min(Math.max(e.clientX - ws.left, 260), ws.width - 280);
  edPanel.style.flex = `0 0 ${w}px`;
});
document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false; divider.classList.remove('dragging');
  document.body.style.cursor = ''; document.body.style.userSelect = '';
});

// ── File open ──────────────────────────────────────────────────────────────────
document.getElementById('btn-open').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    editor.value = ev.target.result;
    document.querySelector('.ed-hdr .lx-badge').textContent = f.name;
    renderPreview();
    showToast(`Opened: ${f.name}`, 'check_circle');
  };
  r.readAsText(f);
  e.target.value = '';
});

// ── File save ──────────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', saveSource);
function saveSource() {
  const blob = new Blob([editor.value], { type: 'text/plain' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: document.querySelector('.ed-hdr .lx-badge').textContent || 'document.zl',
  });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('Source saved', 'check_circle');
}

// ── Mobile view switch ─────────────────────────────────────────────────────────
document.querySelectorAll('.view-switch .btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.view-switch .btn').forEach(x => {
    x.classList.remove('active');
    x.classList.replace('btn-secondary', 'btn-ghost');
  });
  b.classList.add('active');
  b.classList.replace('btn-ghost', 'btn-secondary');
  document.documentElement.dataset.view = b.dataset.view;
}));

// ── PDF export ─────────────────────────────────────────────────────────────────
document.getElementById('btn-pdf').addEventListener('click', async () => {
  // Load html2pdf dynamically on first use
  if (typeof html2pdf === 'undefined') {
    await new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  
  const overlay = document.getElementById('loading-overlay');
  overlay.style.display = 'flex';
  
  const root = document.getElementById('pdf-root');
  document.body.classList.add('exporting');
  await html2pdf().set({
    margin: [12, 15, 12, 15],
    filename: 'zolto-document.pdf',
    image: { type: 'jpeg', quality: 0.97 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#15171B' },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
  }).from(root).save();
  
  overlay.style.display = 'none';
  document.body.classList.remove('exporting');
  showToast('PDF exported successfully', 'check_circle');
});

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastT;
function showToast(msg, icon = 'info') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.querySelector('.material-symbols-rounded').textContent = icon;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3200);
}

// ── Test modal ─────────────────────────────────────────────────────────────────
const modal = document.getElementById('modal');
const closeModal = () => modal.classList.remove('open');
document.getElementById('btn-tests').addEventListener('click', async () => {
  modal.classList.add('open');
  document.getElementById('modal-summary').innerHTML = '<span style="color:var(--text-secondary)">Running tests…</span>';
  document.getElementById('modal-body-content').innerHTML = '';
  
  const { runAllTests } = await import('./tests/tests.js');
  const { results, passed, failed, total } = runAllTests();
  
  const fc = failed === 0 ? 'var(--accent-green)' : 'var(--accent-red)';
  document.getElementById('modal-summary').innerHTML =
    `<span style="color:${fc};font-weight:600">${passed}/${total} passed</span>` +
    (failed ? ` — <span style="color:var(--accent-red)">${failed} failed</span>` : ' <span style="color:var(--text-tertiary)">·</span> All green');
    
  let html = '', suite = '';
  for (const r of results) {
    if (r.suite !== suite) {
      suite = r.suite;
      html += `<div style="color:var(--text-secondary); font-weight:600; margin-top:8px; border-top:1px solid var(--border-subtle); padding-top:4px;">${esc(suite)}</div>`;
    }
    html += r.pass
      ? `<div style="color:var(--accent-green); padding:2px 0;">✓ ${esc(r.desc)}</div>`
      : `<div style="color:var(--accent-red); padding:2px 0;">✗ ${esc(r.desc)}</div>` +
        (r.error ? `<div style="color:var(--accent-amber); padding-left:16px;">${esc(r.error)}</div>` : '');
  }
  document.getElementById('modal-body-content').innerHTML = html;
});
document.getElementById('btn-modal-close').addEventListener('click', closeModal);
document.getElementById('btn-modal-close-foot').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── Default content ─────────────────────────────────────────────────────────────
editor.value = `---
title: Zolto Studio · LeonUX
version: 2.0.0
---

@var studio  = Zolto Studio
@var phase   = LeonUX Upgrade

# {{studio}} {#top}

> **{{studio}}** extends the Phase 1 Markdown core into a complete,
> production-quality "Extended Markdown" layer — fully backward
> compatible with standard Markdown. This is the **{{phase}}**.

---

## GitHub-Style Callouts

> [!NOTE]
> Callouts use the same \`> [!TYPE]\` syntax GitHub renders natively.

> [!TIP]
> Six types ship out of the box: NOTE, TIP, WARNING, IMPORTANT, CAUTION, DANGER.

> [!WARNING]
> Each one carries its own icon, color, and accessible ARIA role.

## Native Admonitions

[info title="Did you know?"]
Admonitions are an alternative to callouts that render as bordered glass panels.
[/info]

## Code Blocks with Syntax Highlighting

\`\`\`js
const renderPreview = () => {
  const html = compile(editor.value);
  preview.innerHTML = html;
};
\`\`\`

- [x] Fluid Typography
- [x] Spring Animations
- [x] Keypad Mobile Support
`;
renderPreview();

// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((registration) => {
        console.log('[PWA] Service Worker registered:', registration.scope);
      })
      .catch((error) => {
        console.log('[PWA] Service Worker registration failed:', error);
      });
  });
}

</script>
</body>
</html>
